<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的图片展示页</title>
    <!-- 可选：设置页面样式，让图片显示更美观 -->
    <style>
        body { padding: 20px; }
        img { 
            width: 500px; /* 控制图片宽度 */
            margin: 10px 0; /* 图片上下间距 */
            border: 1px solid #eee; /* 可选：加个边框 */
        }
    </style>
</head>
<body>
    <h1>我的图片库</h1>
    <!-- 引用第一张图片 -->
    <p>备用人物图片：</p>
    <img src="https://wyo-chag.github.io/my-uncle/beiyongrenwu1.png" alt="备用人物图片">

    <!-- 如果有其他图片，按同样格式添加即可 -->
    <!-- <p>大军混沌图片：</p>
    <img src="https://wyo-chag.github.io/my-uncle/dajunhunmi1.png" alt="大军混沌图片"> -->
</body>
</html>
